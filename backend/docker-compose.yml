version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ab_tree_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ab_tree_db
    networks:
      - ab_tree_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/ab_tree_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: ab_tree_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ab_tree_db
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ab_tree_network
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local

networks:
  ab_tree_network:
    driver: bridge
